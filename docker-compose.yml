version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./carbon_model_real_70.pkl:/app/carbon_model_real_70.pkl
    command: uvicorn api:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - api
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0