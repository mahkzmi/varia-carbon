<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | VARIA Carbon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-['Inter'] bg-gray-50 min-h-screen flex flex-col">

  <nav class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="text-2xl font-bold text-green-700">🌾 VARIA Carbon</a>
      <div class="flex items-center gap-4">
        <a href="login.html" class="text-sm text-gray-600 hover:text-green-700">Login</a>
      </div>
    </div>
  </nav>

  <div class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full border border-gray-100">
      <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">Create Account</h2>
      <p class="text-center text-gray-500 text-sm mb-8">Start predicting soil carbon in seconds</p>
      
      <form id="signupForm">
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-2">Full Name</label>
          <input type="text" id="fullName" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition" placeholder="Mahdieh Kazemi" required>
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-2">Email</label>
          <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition" placeholder="you@example.com" required>
        </div>
        <div class="mb-6">
          <label class="block text-gray-700 font-medium mb-2">Password</label>
          <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <button type="submit" id="signupBtn" class="w-full bg-green-700 text-white py-3 rounded-xl font-bold hover:bg-green-800 transition shadow-md">
          Create Account →
        </button>
      </form>
      
      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account? <a href="login.html" class="text-green-700 font-medium hover:underline">Login</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('signupBtn');
      const originalText = submitBtn.textContent;
      
      if (!fullName || !email || !password) {
        alert('Please fill in all fields.');
        return;
      }
      
      if (password.length < 6) {
        alert('Password must be at least 6 characters.');
        return;
      }
      
      submitBtn.textContent = '⏳ Creating account...';
      submitBtn.disabled = true;
      
      try {
        const response = await fetch('http://127.0.0.1:8000/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            email: email,
            password: password,
            full_name: fullName
          })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          alert('✅ Account created successfully! Please login.');
          window.location.href = 'login.html';
        } else {
          alert('❌ Registration failed: ' + (data.detail || 'Unknown error'));
          submitBtn.textContent = originalText;
          submitBtn.disabled = false;
        }
      } catch (error) {
        console.error('Signup error:', error);
        alert('❌ Connection error. Please make sure the backend server is running.');
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
