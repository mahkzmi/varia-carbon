<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Log in to your VARIA Carbon account and start predicting soil organic carbon from satellite data."/>
  <title>Login | VARIA Carbon</title>

  <!-- Tailwind + Custom -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .btn-primary {
      @apply bg-green-700 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-800 transition-all duration-300 shadow-md hover:shadow-lg;
    }
    .input-field {
      @apply w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all duration-200 bg-gray-50/50;
    }
    .auth-card {
      @apply bg-white rounded-3xl shadow-xl p-8 md:p-10 max-w-md w-full border border-gray-100/80;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-br from-gray-50 to-gray-100/70">

  <!-- ========== NAV ========== -->
  <nav class="bg-white/80 backdrop-blur-md shadow-sm border-b border-gray-100/80">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="text-2xl font-bold text-green-700 hover:text-green-800 transition flex items-center gap-2">
        <span>🌾</span> VARIA Carbon
      </a>
      <div class="flex items-center gap-4">
        <a href="signup.html" class="text-sm font-medium text-gray-600 hover:text-green-700 transition">
          Create account
        </a>
      </div>
    </div>
  </nav>

  <!-- ========== LOGIN CARD ========== -->
  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="auth-card">

      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Welcome back</h1>
        <p class="text-gray-500 text-sm mt-1">Log in to your VARIA Carbon account</p>
      </div>

      <form id="loginForm" novalidate>
        <!-- Email -->
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input
            type="email"
            id="email"
            class="input-field"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <!-- Password -->
        <div class="mb-6">
          <div class="flex justify-between items-center mb-1.5">
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <a href="#" class="text-xs text-green-700 hover:underline font-medium">Forgot?</a>
          </div>
          <input
            type="password"
            id="password"
            class="input-field"
            placeholder="••••••••"
            required
            autocomplete="current-password"
            minlength="6"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          id="loginBtn"
          class="btn-primary w-full flex items-center justify-center gap-2"
        >
          Log in →
        </button>
      </form>

      <!-- Footer link -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="signup.html" class="text-green-700 font-medium hover:underline">Sign up</a>
      </p>
    </div>
  </main>

  <!-- ========== SCRIPT ========== -->
  <script>
    (function() {
      const form = document.getElementById('loginForm');
      const btn = document.getElementById('loginBtn');
      const emailInput = document.getElementById('email');
      const passInput = document.getElementById('password');

      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = emailInput.value.trim();
        const password = passInput.value.trim();

        if (!email || !password) {
          alert('Please fill in both fields.');
          return;
        }

        const originalText = btn.textContent;
        btn.textContent = '⏳ Logging in...';
        btn.disabled = true;

        try {
          const formData = new URLSearchParams();
          formData.append('username', email);
          formData.append('password', password);

          const response = await fetch('http://127.0.0.1:8000/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: formData,
          });

          const data = await response.json();

          if (response.ok && data.access_token) {
            localStorage.setItem('token', data.access_token);

            btn.textContent = '✅ Success!';
            btn.style.backgroundColor = '#16a34a';

            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 400);
          } else {
            alert('❌ Login failed: ' + (data.detail || 'Invalid credentials'));
            btn.textContent = originalText;
            btn.disabled = false;
          }
        } catch (error) {
          console.error('Login error:', error);
          alert('❌ Connection error. Please make sure the backend server is running.');
          btn.textContent = originalText;
          btn.disabled = false;
        }
      });
    })();
  </script>

</body>
</html>
